name: dmtool-dev

services:
  dev-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      UVICORN_WORKERS: 1
    env_file:
      - .env.dev
    networks: [default, shared]
    depends_on:
      dev-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dev-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.dev
    networks: [default, shared]
    depends_on:
      dev-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dev-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    env_file:
      - .env.dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmtool_dev -d dmtool_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
  shared:
    name: dmtool_shared
    external: true

volumes:
  pgdata_dev:
